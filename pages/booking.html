<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking | Asi Turkish Kitchen</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    html { scroll-behavior: smooth; }
  </style>
</head>

<body class="bg-gray-100">

<!-- HEADER -->
<header class="flex flex-col md:flex-row items-center justify-between gap-4 px-6 md:px-10 py-6 bg-black text-white">

  <!-- LOGO + BRAND -->
  <div class="flex items-center gap-3">

    <img src="../images/logo.jpeg"
         class="h-14 w-14 md:h-16 md:w-16 rounded-full object-cover border-2 border-white">

    <div>
      <h1 class="text-lg md:text-xl font-bold">Asi Turkish Kitchen</h1>
      <p class="text-sm text-gray-300">Reservation</p>
    </div>

  </div>

  <!-- BACK BUTTON -->
  <a href="home.html"
     class="bg-white text-black px-5 py-2 rounded-full hover:bg-gray-200 transition">
    ← Back Home
  </a>

</header>

<!-- MAIN -->
<main class="min-h-screen flex items-center justify-center px-6 py-12">

  <section class="w-full max-w-3xl bg-white rounded-3xl shadow-2xl p-6 md:p-10">

    <h1 class="text-3xl md:text-4xl font-bold text-center mb-2">
      Book Your Table
    </h1>

    <p class="text-center text-gray-500 mb-10">
      Reserve your table and enjoy an authentic Turkish dining experience
    </p>

    <!-- FORM -->
    <form id="booking-form" class="space-y-6">

      <!-- NAME -->
      <input id="name" type="text" placeholder="Full Name"
        class="w-full p-4 rounded-xl bg-gray-100 border focus:bg-white focus:ring-2 focus:ring-green-600 outline-none">

      <!-- PHONE + EMAIL -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

        <input id="phone" type="tel" placeholder="Phone Number"
          class="w-full p-4 rounded-xl bg-gray-100 border focus:bg-white focus:ring-2 focus:ring-green-600 outline-none">

        <input id="email" type="email" placeholder="Email"
          class="w-full p-4 rounded-xl bg-gray-100 border focus:bg-white focus:ring-2 focus:ring-green-600 outline-none">

      </div>

      <!-- DATE + TIME -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

        <input id="date" type="date"
          class="w-full p-4 rounded-xl bg-gray-100 border">

        <input id="time" type="time"
          class="w-full p-4 rounded-xl bg-gray-100 border">

      </div>

      <!-- GUESTS -->
      <input id="guests" type="number" min="1" max="20" placeholder="Number of Guests"
        class="w-full p-4 rounded-xl bg-gray-100 border">

      <!-- REQUESTS -->
      <textarea id="requests" rows="4" placeholder="Special Requests"
        class="w-full p-4 rounded-xl bg-gray-100 border"></textarea>

      <!-- BUTTON -->
      <button type="submit"
        class="w-full bg-red-900 text-white py-4 rounded-xl text-lg font-semibold hover:bg-red-800 transition">
        Reserve Table
      </button>

    </form>

  </section>

</main>

<!-- EMAILJS -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script src="../js/booking.js"></script>

</body>
</html>
